<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cendekia · Aplikasi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --obsidian:#0a0a0b; --panel:#111113; --line:rgba(236,233,226,.10);
    --smoke:#7d7d84; --mist:#b8b6b0; --beacon:#ece9e2; --gold:#d9a441;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--obsidian); color:var(--beacon);
    font-family:'Inter',sans-serif; height:100vh; display:flex; flex-direction:column;
    overflow:hidden;
  }
  /* ---------- Top bar ---------- */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px; border-bottom:1px solid var(--line); flex-shrink:0;
  }
  .brand{font-family:'Fraunces',serif; font-size:20px; letter-spacing:.5px;}
  .brand b{color:var(--gold); font-weight:600;}
  .status{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--smoke);}
  .dot{width:8px; height:8px; border-radius:50%; background:#555; transition:.3s;}
  .dot.on{background:#4ade80; box-shadow:0 0 8px #4ade80;}
  .dot.off{background:#ef4444;}
  /* ---------- Main ---------- */
  main{flex:1; display:flex; flex-direction:column; max-width:820px; width:100%; margin:0 auto; overflow:hidden;}
  /* Upload */
  .uploader{
    margin:18px 24px 0; padding:14px 18px; border:1px dashed var(--line);
    border-radius:14px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    background:var(--panel);
  }
  .uploader .u-txt{flex:1; min-width:180px; font-size:13px; color:var(--mist);}
  .uploader .u-txt small{display:block; color:var(--smoke); margin-top:2px;}
  .btn{
    font-family:'Inter',sans-serif; font-size:13px; font-weight:500; cursor:pointer;
    border:1px solid var(--line); background:transparent; color:var(--beacon);
    padding:9px 16px; border-radius:10px; transition:.2s;
  }
  .btn:hover{border-color:var(--gold); color:var(--gold);}
  .btn.gold{background:var(--gold); color:#0a0a0b; border-color:var(--gold); font-weight:600;}
  .btn.gold:hover{filter:brightness(1.08); color:#0a0a0b;}
  input[type=file]{display:none;}
  /* Chat */
  .chat{flex:1; overflow-y:auto; padding:22px 24px; display:flex; flex-direction:column; gap:16px;}
  .chat::-webkit-scrollbar{width:8px;}
  .chat::-webkit-scrollbar-thumb{background:var(--line); border-radius:8px;}
  .msg{max-width:78%; padding:12px 16px; border-radius:14px; font-size:14.5px; line-height:1.6; white-space:pre-wrap; word-wrap:break-word;}
  .msg.user{align-self:flex-end; background:#1c1c20; border:1px solid var(--line);}
  .msg.ai{align-self:flex-start; background:transparent; border:1px solid var(--line); border-left:2px solid var(--gold);}
  .msg.ai .cur{color:var(--gold);}
  .empty{margin:auto; text-align:center; color:var(--smoke);}
  .empty h2{font-family:'Fraunces',serif; font-weight:400; font-size:26px; color:var(--mist); margin-bottom:8px;}
  .empty p{font-size:14px; max-width:360px;}
  /* Input bar */
  .inputbar{
    flex-shrink:0; padding:14px 24px 22px; border-top:1px solid var(--line);
    display:flex; gap:10px; align-items:flex-end;
  }
  .inputbar textarea{
    flex:1; resize:none; background:var(--panel); color:var(--beacon);
    border:1px solid var(--line); border-radius:12px; padding:12px 14px;
    font-family:'Inter',sans-serif; font-size:14.5px; line-height:1.5; max-height:120px;
  }
  .inputbar textarea:focus{outline:none; border-color:var(--gold);}
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--panel); border:1px solid var(--line); color:var(--mist);
    padding:10px 18px; border-radius:10px; font-size:13px; opacity:0; transition:.3s;
    pointer-events:none;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>
  <header>
    <div class="brand">Cendekia<b>.</b></div>
    <div class="status"><span class="dot" id="dot"></span><span id="statusTxt">menyambungkan…</span></div>
  </header>

  <main>
    <div class="uploader">
      <div class="u-txt">
        <span id="docName">Belum ada dokumen aktif.</span>
        <small>Unggah PDF untuk mulai bertanya (menggantikan dokumen sebelumnya).</small>
      </div>
      <input type="file" id="fileInput" accept="application/pdf" />
      <button class="btn" onclick="document.getElementById('fileInput').click()">Pilih PDF</button>
      <button class="btn gold" id="uploadBtn" disabled>Unggah</button>
    </div>

    <div class="chat" id="chat">
      <div class="empty" id="empty">
        <h2>Kecerdasan yang tenang.</h2>
        <p>Tanyakan apa saja tentang dokumen aktifmu. Jawaban bersumber langsung dari isinya.</p>
      </div>
    </div>

    <div class="inputbar">
      <textarea id="input" rows="1" placeholder="Tanyakan sesuatu tentang dokumen…"></textarea>
      <button class="btn gold" id="sendBtn">Tanya</button>
    </div>
  </main>

  <div class="toast" id="toast"></div>

<script>
  // ====== Ganti ini kalau backend-mu sudah online (mis. di Render/Railway) ======
  const API_BASE = "http://127.0.0.1:8000";

  const chat = document.getElementById("chat");
  const empty = document.getElementById("empty");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");
  const fileInput = document.getElementById("fileInput");
  const uploadBtn = document.getElementById("uploadBtn");
  const docName = document.getElementById("docName");
  const dot = document.getElementById("dot");
  const statusTxt = document.getElementById("statusTxt");
  const toast = document.getElementById("toast");
  let sibuk = false;

  function tampilToast(pesan){
    toast.textContent = pesan; toast.classList.add("show");
    setTimeout(()=>toast.classList.remove("show"), 2600);
  }
  function keBawah(){ chat.scrollTop = chat.scrollHeight; }

  // ---------- Cek koneksi backend ----------
  async function cekBackend(){
    try{
      const r = await fetch(API_BASE + "/health");
      const j = await r.json();
      dot.className = "dot on";
      statusTxt.textContent = `terhubung · ${j.jumlah_potongan} potongan`;
    }catch(e){
      dot.className = "dot off";
      statusTxt.textContent = "backend mati";
    }
  }

  // ---------- Auto-resize textarea ----------
  input.addEventListener("input", ()=>{
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });
  input.addEventListener("keydown", (e)=>{
    if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); kirim(); }
  });

  // ---------- Upload PDF ----------
  fileInput.addEventListener("change", ()=>{
    if(fileInput.files.length){
      uploadBtn.disabled = false;
      docName.textContent = "Siap diunggah: " + fileInput.files[0].name;
    }
  });
  uploadBtn.addEventListener("click", async ()=>{
    const file = fileInput.files[0];
    if(!file) return;
    uploadBtn.disabled = true; uploadBtn.textContent = "Mengunggah…";
    try{
      const fd = new FormData(); fd.append("file", file);
      const r = await fetch(API_BASE + "/upload", { method:"POST", body: fd });
      const j = await r.json();
      if(j.status === "ok"){
        docName.textContent = `Dokumen aktif: ${j.nama_file} (${j.jumlah_potongan} potongan)`;
        tampilToast("Dokumen berhasil diindeks ✓");
        cekBackend();
      }else{
        tampilToast(j.pesan || "Gagal mengunggah");
        docName.textContent = "Belum ada dokumen aktif.";
      }
    }catch(e){
      tampilToast("Tidak bisa terhubung ke backend");
    }
    uploadBtn.textContent = "Unggah"; uploadBtn.disabled = false;
  });

  // ---------- Kirim pertanyaan (streaming) ----------
  function tambahPesan(kelas, teks){
    if(empty) empty.style.display = "none";
    const el = document.createElement("div");
    el.className = "msg " + kelas;
    el.textContent = teks;
    chat.appendChild(el); keBawah();
    return el;
  }

  async function kirim(){
    const pertanyaan = input.value.trim();
    if(!pertanyaan || sibuk) return;
    sibuk = true; sendBtn.disabled = true;
    input.value = ""; input.style.height = "auto";

    tambahPesan("user", pertanyaan);
    const bubble = tambahPesan("ai", "");
    bubble.innerHTML = '<span class="cur">█</span>';

    try{
      const res = await fetch(API_BASE + "/tanya", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ pertanyaan })
      });
      if(!res.ok) throw new Error("status " + res.status);

      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let teks = "";
      while(true){
        const { done, value } = await reader.read();
        if(done) break;
        teks += dec.decode(value, { stream:true });
        bubble.textContent = teks;
        keBawah();
      }
      if(!teks.trim()) bubble.textContent = "(tidak ada jawaban)";
    }catch(e){
      bubble.textContent = "⚠️ Gagal menghubungi backend. Pastikan server berjalan di " + API_BASE;
    }
    sibuk = false; sendBtn.disabled = false; input.focus();
  }

  sendBtn.addEventListener("click", kirim);

  // init
  cekBackend();
  setInterval(cekBackend, 15000);
</script>
</body>
</html>
